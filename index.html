<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歐盟電池法 — 初步合規診斷 | REnato lab</title>
<style>
  :root{--green:#1b2cff;--green-light:#e6ebfa;--ink:#172033;--muted:#566074;--line:#c6d0e2;--bg:#eaeef6;--orange:#b45309;--blue:#1b2cff;--card:#fff;--navy:#10172b;}
  *{box-sizing:border-box}
  body{font-family:"Noto Sans TC",-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;
    margin:0;background:var(--bg);color:var(--ink);line-height:1.55;background-image:linear-gradient(#dde4f0 1px,transparent 1px),linear-gradient(90deg,#dde4f0 1px,transparent 1px);background-size:26px 26px}
  header{background:var(--navy);color:#fff;padding:14px 20px}
  .hd-row{display:flex;align-items:center;gap:14px;max-width:740px;margin:0 auto}
  .hd-logo svg{height:26px;width:auto;display:block} .hd-logo svg path{fill:#fff}
  header h1{margin:0;font-size:16px;font-weight:700;letter-spacing:.02em} header p{margin:3px 0 0;font-size:11.5px;opacity:.82}
  .langbtn{margin-left:auto;align-self:center;background:transparent;color:#fff;border:1px solid rgba(255,255,255,.45);padding:5px 11px;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap}
  .langbtn:hover{background:rgba(255,255,255,.14)}
  .wrap{max-width:740px;margin:0 auto;padding:18px 18px 60px}
  .progress{display:flex;gap:5px;margin-bottom:6px}
  .pstep{flex:1;text-align:center;font-size:10px;color:var(--muted);cursor:pointer;transition:.12s}
  .pstep:hover{color:var(--green)} .pstep:hover .pbar{background:#9cb9de}
  .phint{font-size:10.5px;color:#b0a98f;text-align:center;margin-bottom:14px}
  .pbar{height:6px;border-radius:0;background:var(--line);margin-bottom:5px}
  .pstep.done .pbar{background:var(--green)} .pstep.done{color:var(--green)}
  .pstep.current .pbar{background:var(--green)} .pstep.current{color:var(--ink);font-weight:700}
  .pstep.skipped .pbar{background:#e8e3d6;background-image:repeating-linear-gradient(45deg,#e8e3d6 0 4px,#f2eee3 4px 8px)}
  .pstep.skipped{color:#b0a98f}
  .card{background:var(--card);border:1px solid var(--line);border-radius:0;padding:20px 22px;margin-bottom:14px}
  .stagehd{font-family:ui-monospace,Menlo,monospace;font-size:10.5px;color:var(--green);font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:4px}
  .stagesub{font-size:11.5px;color:var(--muted);margin-bottom:16px}
  .q{padding:14px 0;border-top:1px solid #eef1ee}
  .q:first-of-type{border-top:none;padding-top:4px}
  .qid{font-family:ui-monospace,Menlo,monospace;font-size:9.5px;color:#8c97ad;font-weight:700;letter-spacing:.06em}
  .q-label{font-weight:600;font-size:14.5px;margin:2px 0 3px}
  .q-hint{color:var(--muted);font-size:11.8px;margin-bottom:9px;display:block}
  .opts{display:flex;flex-wrap:wrap;gap:7px}
  .opt{border:1px solid var(--line);border-radius:0;padding:8px 13px;cursor:pointer;
    font-size:13px;background:#fff;transition:.12s;min-height:38px;display:flex;align-items:center}
  .opt:hover{border-color:var(--green)}
  .opt.sel{background:var(--green-light);border-color:var(--green);color:var(--green);font-weight:600}
  .opt.unk{color:var(--muted)} .opt.unk.sel{color:var(--orange);border-color:var(--orange);background:#fdf3e3}
  .multi-tag{font-size:10px;color:var(--blue);background:#eef4ff;border-radius:0;padding:1px 7px;margin-left:6px}
  input[type=text]{width:100%;max-width:380px;padding:9px 12px;border:1px solid var(--line);border-radius:0;font-size:13px}
  .nav{display:flex;justify-content:space-between;gap:12px;margin-top:6px}
  .btn{border:none;border-radius:0;padding:12px 24px;font-size:14.5px;font-weight:600;cursor:pointer}
  .btn-primary{background:var(--green);color:#fff} .btn-primary:disabled{background:#b6c7e0;cursor:not-allowed}
  .btn-ghost{background:#fff;color:var(--muted);border:1px solid var(--line)}
  .end{text-align:center;padding:14px 8px}
  .end .icon{font-size:38px;margin-bottom:6px} .end h2{margin:0 0 6px;font-size:18px}
  .end p{color:var(--muted);max-width:460px;margin:0 auto 14px;font-size:13px}
  .count{display:inline-block;background:var(--green-light);color:var(--green);font-weight:700;
    border-radius:0;padding:4px 14px;margin-bottom:14px;font-size:13px}
  .note{font-size:11px;color:#b0a98f;margin-top:12px;text-align:center}
  .zone{margin-bottom:16px}
  .zone-h{font-size:13px;font-weight:700;padding:6px 12px;border-radius:0;margin-bottom:8px}
  .zone-h.zc{background:var(--green-light);color:var(--green)}
  .zone-h.zn{background:#fdf3e3;color:#8a5a00}
  .zone-h.zx{background:#eef0ee;color:#7a857f}
  .lt{border:1px solid var(--line);border-left:4px solid var(--line);border-radius:0;padding:12px 14px;margin-bottom:9px;background:#fff;text-align:left}
  .lt.confirmed{border-left-color:var(--green)} .lt.needs{border-left-color:var(--orange)} .lt.cannot{border-left-color:#b7c1bb;opacity:.85}
  .lt-h{font-size:14px} .lt-h b{color:var(--green)} .lt.cannot .lt-h b{color:#7a857f}
  .lt-art{font-size:11px;color:var(--muted);margin:2px 0 6px}
  .lt-desc{font-size:13px} .lt-resp{font-size:12px;color:var(--muted);margin-top:5px}
  .why2{font-size:11.5px;color:var(--green);background:var(--green-light);padding:5px 9px;border-radius:0;margin-top:7px}
  .note2{font-size:11.5px;color:#8a5a00;background:#fdf3e3;padding:5px 9px;border-radius:0;margin-top:7px}
  .lt-trig{font-size:10.5px;color:#b0a98f;margin-top:6px}
  .note3{font-size:11.5px;color:#566074;background:#eef0f4;padding:5px 9px;margin-top:7px;line-height:1.6}
  .lt-act{font-size:12px;margin-top:7px;line-height:1.6} .lt-act b{color:var(--green)}
  .lt-note{font-size:10.5px;color:#8c97ad;margin-top:6px;line-height:1.55}
  .email-h{font-weight:600;margin-bottom:8px}
  #emailbox{width:100%;max-width:320px;padding:9px 12px;border:1px solid var(--line);border-radius:0;font-size:13px;margin-bottom:8px}
  .consent{display:flex;gap:7px;align-items:center;font-size:12.5px;margin-bottom:8px;cursor:pointer}
  .privacy2{font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:10px}
  .emaildone{color:var(--green);font-size:13px;font-weight:600}
  .landing{max-width:620px;margin:0 auto}
  .lhero{text-align:center;padding:14px 10px 18px}
  .licon{font-size:46px}
  .lhero h1{font-size:22px;margin:8px 0 6px}
  .lsub{color:var(--muted);font-size:14px;max-width:460px;margin:0 auto 18px;line-height:1.6}
  .lbtn{padding:14px 34px;font-size:16px}
  .lcard{background:#fff;border:1px solid var(--line);border-radius:0;padding:18px 20px;margin-bottom:14px}
  .lcard p{margin:0 0 12px;font-size:13.5px;color:var(--ink);line-height:1.7}
  .lcard p:last-child{margin-bottom:0}
  .lcard .lk{color:var(--green);font-weight:700}
  .ldisc{color:var(--muted);font-size:12px;border-top:1px solid var(--line);padding-top:12px;margin-top:4px!important}
  .rpills{display:flex;gap:8px;flex-wrap:wrap;margin:2px 0 12px}
  .rp{font-size:11.5px;font-weight:700;padding:4px 10px;border:1px solid}
  .rp1{color:var(--green);border-color:var(--green);background:var(--green-light)}
  .rp2{color:#8a5a00;border-color:#e7c890;background:#fdf3e3}
  .rp3{color:#7a857f;border-color:#cdd4cf;background:#eef0ee}
  .ltrust{font-size:11.5px;color:#33507e;background:#eef2fb;padding:8px 11px;border-left:3px solid var(--green);margin:0 0 12px;line-height:1.6}
  .hint-toggle{display:inline-block;font-size:11.5px;color:var(--green);cursor:pointer;font-weight:600;margin-bottom:9px;user-select:none}
  .hint-clamp{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px;line-height:1.65}
  .hint-clamp.open{display:block;-webkit-line-clamp:unset;overflow:visible;margin-bottom:9px}
  .q-hint b{color:var(--ink);font-weight:700}
</style>
</head>

 {id:"G1-Q02",s:1,trig:"stationary battery energy storage systems",type:"single",label:"此產品是否屬於「固定式」電池儲能系統（BESS）？",hint:"固定式儲能系統指安裝於固定位置、用於儲存並回供電能的電池系統（如家用、工商業、電網級儲能）；可搬移式儲能裝置則否。歐盟對固定式儲能系統有額外安全規範，且其電池分類通常為工業電池。",opts:[{v:"yes",t:"是"},{v:"no",t:"否"},{v:"unknown",t:"不清楚",unk:1}],when:a=>a["G1-Q01"]==="Batteries incorporated into products"},
 {id:"G1-Q03",s:1,trig:"categories of batteries",type:"single",label:"電池產品屬於哪一種類別？",hint:"<b>可攜式電池 (Portable battery)</b>：密封、重量為 5 公斤（含）以下，且非專門為工業用途設計，同時不屬於電動車電池、輕型交通工具 (LMT) 電池或啟動照明 (SLI) 電池的電池。<br><b>輕型交通工具電池 (Light means of transport battery, LMT battery)</b>：密封、重量為 25 公斤（含）以下，提供微型交通工具、電輔車、機車、三輪車輛及輕型四輪車使用的電池（含 micromobility 與歐盟 L 類車輛）。<br><b>啟動、照明和點火電池 (Starting, lighting and ignition battery, SLI battery)</b>：用於啟動、照明或點火所需電力的電池，如：汽機車蓄電池、發電機啟動電池等。<br><b>工業用電池 (Industrial battery)</b>：工業用途設計的電池，包含全新、經過準備改變用途 (preparation for repurposing) 或改變用途 (repurposing) 後擬用於工業用途的電池。此外，任何重量超過 5 公斤，且不屬於電動車電池、LMT 電池或 SLI 電池的「其他電池」皆歸於此類。<br><b>電動車電池 (Electric vehicle battery)</b>：重量超過 25 公斤的輕型交通工具電池，及電動小客車、小貨車、大貨車、大客車電池。<br><b>固定式儲能系統（BESS）</b>一般歸類為工業電池。",
   opts:[{v:"portable battery",t:"可攜式電池"},{v:"LMT battery",t:"輕型運輸工具電池"},{v:"SLI battery",t:"啟動照明和點火電池"},{v:"industrial battery",t:"工業電池"},{v:"electric vehicle battery",t:"電動車電池"},{v:"unknown",t:"不清楚",unk:1}],when:a=>!!a["G0-Q03"]},
 {id:"G2-Q01",s:2,trig:"battery life stage",type:"single",label:"電池產品所屬的生命週期階段？",hint:"<b>全新電池</b>：全新生產的新電池。<br><b>已使用電池</b>：經過再利用、再製造、改變用途的電池。<br><b>廢電池</b>：無論電池狀態，只要被使用者丟棄、試圖丟棄、或被要求丟棄，都屬於廢棄電池。詳細請參考《廢棄物框架指令》（Directive 2008/98/EC）。<br><b>廢電池分選物</b>：回收電池的產物，如黑粉。",

 {id:"G2-Q02",s:2,trig:"二次生命（context）",type:"multi",label:"若您的製程涉及已使用電池或廢電池，請選擇處理方式。",hint:"<b>再利用</b>：將「非廢電池」或其零件，再次用於其最初設計相同用途的作業。<br><b>改變用途</b>：任何導致「非廢電池」或其零件，被用於其最初設計目的或應用以外的用途的作業。<br><b>再製造</b>：對二手電池進行作業。該作業有非常嚴格的客觀標準：必須拆解與評估其所有的電芯與模組，並使用指定數量的全新、二手或從廢棄物中回收的電芯、模組或其他電池零件，將電池容量恢復至至少為原始額定容量的 90%，並確保所有個別電芯之間的健康狀態差異不超過 3%，最終使該電池用於與其最初設計相同的目的或應用。<br><b>準備再利用</b>：使「廢電池」或其零件經過準備後，能夠在不需要其他預先處理的情況下被再次利用。<br><b>準備改變用途</b>：對「廢電池」或其零件進行準備的任何作業，使其能夠用於其最初設計目的或應用以外的用途。<br><b>準備回收</b>：廢電池在進入任何回收程序之前所進行的處理 (treatment) 作業，包括（但不限於）電池包的儲存、搬運與拆解，或是將不屬於電池本身的分選物 (fractions) 分離出來。<br><b>分揀</b>：廢電池搜集後，為了運輸至處理設施而進行的初步分類。",

 {id:"G3-Q02",s:3,trig:"market deployment actions",type:"multi",label:"產品進入歐盟市場的方式爲何？",hint:"<b>投放市場</b>：指電池「首次」供應在歐盟市場上。一顆電池的生命週期中，只會被「投放市場」一次，例如歐盟境內製造商首次出廠交貨，或進口商首次清關引入等。<br><b>在市場上供應</b>：指在商業活動過程中，將電池供應至歐盟市場以供分銷或使用，無論有償（付費）或無償（免費）。只要電池在歐盟供應鏈中發生任何形式的轉移（例如進口商交給經銷商、經銷商鋪貨給零售商），每一次轉移都符合此定義。<br><b>投入使用</b>：電池在沒有被投放市場的情況下，進入歐盟使用。本定義主要是防堵業者技巧性逃避前兩項定義，包含生產電池自用以及進口電池自用。",

 "G1-Q03":{label:"Which battery category does the product fall under?",hint:"<b>Portable battery</b>: a sealed battery weighing 5 kg or less, not designed specifically for industrial use, and not an electric vehicle, light means of transport (LMT) or starting, lighting and ignition (SLI) battery.<br><b>Light means of transport (LMT) battery</b>: a sealed battery weighing 25 kg or less, used to power micro-mobility vehicles, e-bikes, mopeds, three-wheelers and light four-wheelers (including EU category L vehicles).<br><b>Starting, lighting and ignition (SLI) battery</b>: a battery supplying power for starting, lighting or ignition, e.g. vehicle starter batteries or generator starting batteries.<br><b>Industrial battery</b>: a battery designed for industrial use, including new batteries and those prepared for repurposing or repurposed for industrial use. Any other battery over 5 kg that is not an EV, LMT or SLI battery also falls here.<br><b>Electric vehicle battery</b>: an LMT-vehicle battery weighing over 25 kg, or a battery for electric passenger cars, vans, trucks and buses.<br>A <b>stationary battery energy storage system (BESS)</b> is generally classified as an industrial battery.",opts:{"portable battery":"Portable battery","LMT battery":"Light means of transport (LMT) battery","SLI battery":"Starting, lighting and ignition (SLI) battery","industrial battery":"Industrial battery","electric vehicle battery":"Electric vehicle battery",unknown:"Not sure"}},

function L(zh,en){ return S.lang==='en'?en:zh; }
function qL(q){ var e=I18N[q.id]; return (S.lang==='en'&&e&&e.label)?e.label:q.label; }
function qH(q){ var e=I18N[q.id]; return (S.lang==='en'&&e&&e.hint)?e.hint:q.hint; }
function oT(qid,o){ var e=I18N[qid]; return (S.lang==='en'&&e&&e.opts&&e.opts[o.v]!=null)?e.opts[o.v]:o.t; }
function stN(i){ return S.lang==='en'?STAGES_EN[i].n:STAGES[i].n; }
function stSub(i){ return S.lang==='en'?STAGES_EN[i].sub:STAGES[i].sub; }

const S={a:{},idx:0,skipped:new Set(),ended:null,hist:[],started:false,lang:'zh'};
function pick(id,v){ S.a[id]=v; render(); }
function toggle(id,v){ const arr=S.a[id]||(S.a[id]=[]); const i=arr.indexOf(v); if(i>=0)arr.splice(i,1); else arr.push(v); render(); }
function setText(id,v){ S.a[id]=v; }
function stageQs(s){ return QS.filter(q=>q.s===s && q.when(S.a)); }
function stageApplicable(s){ return stageQs(s).length>0; }

function optHTML(q){
  if(q.type==="text"){ var val=S.a[q.id]?String(S.a[q.id]).replace(/"/g,'&quot;'):""; return '<input type="text" value="'+val+'" oninput="setText(\''+q.id+'\',this.value)" placeholder="'+L('選填','Optional')+'">'; }
  return '<div class="opts">'+q.opts.map(function(o){
    var sel = q.type==="multi" ? ((S.a[q.id]||[]).includes(o.v)?"sel":"") : (S.a[q.id]===o.v?"sel":"");
    var unk=o.unk?"unk":""; var fn=q.type==="multi"?"toggle('"+q.id+"','"+o.v+"')":"pick('"+q.id+"','"+o.v+"')";
    return '<div class="opt '+sel+' '+unk+'" onclick="'+fn+'">'+oT(q.id,o)+'</div>';
  }).join("")+'</div>';
}
function toggleHint(btn){ var el=btn.previousElementSibling; var open=el.classList.toggle('open'); btn.textContent=open?L('收合 ▴','Show less ▴'):L('看更多 ▾','Show more ▾'); }
function qHTML(q){
  var multi=q.type==="multi"?'<span class="multi-tag">'+L('可複選','Multiple choice')+'</span>':"";
  var hintBlock = '<div class="q-hint hint-clamp">'+qH(q)+'</div><span class="hint-toggle" onclick="toggleHint(this)" style="display:none">'+L('看更多 ▾','Show more ▾')+'</span>';
  return '<div class="q"><div class="q-label">'+qL(q)+multi+'</div>'+hintBlock+optHTML(q)+'</div>';
}
/* 只有實際超過 3 行（內容被截斷）時才顯示「看更多」；剛好或未足 3 行則隱藏 */
function applyHintToggles(){
  document.querySelectorAll('.hint-clamp').forEach(function(el){
    var btn=el.nextElementSibling;
    if(!btn||!btn.classList.contains('hint-toggle'))return;
    el.classList.remove('open');
    btn.textContent=L('看更多 ▾','Show more ▾');
    btn.style.display = (el.scrollHeight > el.clientHeight+1) ? '' : 'none';
  });
}
function canNext(){ return stageQs(S.idx).every(function(q){ if(q.type==="text")return true; if(q.type==="multi")return (S.a[q.id]||[]).length>0; return !!S.a[q.id]; }); }
function outOfScope(){ return S.a["G0-Q02"]==="no"; }
function jumpTo(i){ if(i===S.idx&&!S.ended)return; if(!S.ended)S.hist.push(S.idx); S.ended=null; S.idx=i; render(); }
function stageComplete(i){ var qs=stageQs(i); if(!qs.length)return false; return qs.every(function(q){ if(q.type==="text")return true; if(q.type==="multi")return (S.a[q.id]||[]).length>0; return !!S.a[q.id]; }); }
function next(){
  if(S.idx===0 && outOfScope()){ S.ended="out"; return render(); }
  [...S.skipped].forEach(function(x){ if(x>S.idx)S.skipped.delete(x); });
  var j=S.idx+1;
  while(j<6 && !stageApplicable(j)){ S.skipped.add(j); j++; }
  if(j>=6){ return finish(); }
  S.hist.push(S.idx); S.idx=j; render();
}
function back(){ if(S.ended){S.ended=null;return render();} if(S.hist.length){S.idx=S.hist.pop();render();} }
function restart(){ S.a={};S.idx=0;S.skipped=new Set();S.ended=null;S.hist=[];S.serverResults=null;render(); }

function progressHTML(){
  var bar='<div class="progress">'+STAGES.map(function(st,i){
    var cls,label=stN(i);
    if(!stageApplicable(i)){cls="skipped";label=stN(i)+L("·略過"," · skip");}
    else if(i===S.idx&&!S.ended)cls="current";
    else if(stageComplete(i))cls="done"; else cls="upcoming";
    return '<div class="pstep '+cls+'" onclick="jumpTo('+i+')"><div class="pbar"></div>'+label+'</div>';
  }).join("")+'</div>';
  return bar+'<div class="phint">'+L('↑ 可點階段自由切換（藍＝已填、灰斜線＝目前不適用）','↑ Click or tap any stage to switch (blue = done, hatched = not applicable now)')+'</div>';
}

/* ====== 送 Apps Script 算 ====== */
function collectApplicable(){ var m={}; QS.forEach(function(q){ m[q.id]=!!q.when(S.a); }); return m; }
/* 供應形式選項皆為合法 fact，直接送後台即可 */
function buildAnswers(){ var o={}; Object.keys(S.a).forEach(function(k){ o[k]=S.a[k]; }); return o; }
function finish(){
  document.getElementById('app').innerHTML=progressHTML()+'<div class="card"><div class="end"><div class="icon">⏳</div><h2>'+L('計算中…','Calculating…')+'</h2><p>'+L('正在送出作答並比對 Legal Theme，請稍候。','Submitting your answers and matching them against the Legal Themes, please wait.')+'</p></div></div>';
  window.scrollTo(0,0);
  fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({token:GAS_TOKEN,lang:S.lang,caseName:S.a['G0-Q01']||'',answers:buildAnswers(),applicable:collectApplicable()})})
   .then(function(r){return r.json();})
   .then(function(data){if(data.error)throw new Error(data.error);S.serverResults=data.results;S.resultId=data.resultId;S.ended='complete';render();})
   .catch(function(err){S.fetchError=String(err);S.ended='error';render();});
}
function realEmail(){

  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(em)){alert(L('請輸入有效 email','Please enter a valid email address'));return;}
  document.getElementById('emailstep').innerHTML='<div class="emaildone">'+L('寄送中…','Sending…')+'</div>';
  fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({token:GAS_TOKEN,action:'email',lang:S.lang,email:em,resultId:S.resultId,caseName:S.a['G0-Q01']||'',answers:buildAnswers(),applicable:collectApplicable()})})
   .then(function(){document.getElementById('emailstep').innerHTML='<div class="emaildone">'+L('✓ 已寄至 ','✓ Sent to ')+em+L('，請查收 PDF 報告附件。','. Please check the PDF report attachment.')+'</div>';})
   .catch(function(){document.getElementById('emailstep').innerHTML='<div class="emaildone" style="color:#c0392b">'+L('寄送失敗，請稍後再試。','Failed to send. Please try again later.')+'</div>';});
}
function srvCard(o,zone){
  var trigs=(o.triggers||[]).join('、');
  var ec=zone==='confirmed'?'why2':(zone==='needs'?'note2':'note3');
  var body;
  if(o.explanation){ body='<div class="'+ec+'">'+o.explanation+'</div>'; }
  else if(zone==='confirmed'){ body='<div class="why2">'+L('為何命中：','Why it applies: ')+((o.why||[]).join('；')||'—')+'</div>'; }
  else if(zone==='needs'){ body='<div class="note2">'+L('補充以下次要資料可更準確：','Providing the following secondary data improves accuracy: ')+((o.refine||[]).join('、')||'—')+'</div>'; }
  else { body='<div class="note3">'+L('缺少判斷依據：','Missing information to decide: ')+((o.missing||[]).join('、')||'—')+'</div>'; }
  var action=(zone==='confirmed'&&o.action)?'<div class="lt-act"><b>'+L('要採取的行動：','Action to take: ')+'</b>'+o.action+'</div>':'';
  var notes=o.notes?'<div class="lt-note">'+L('附註：','Note: ')+o.notes+'</div>':'';
  return '<div class="lt '+zone+'"><div class="lt-h"><b>'+o.id+'</b> '+o.name+'</div>'+
   '<div class="lt-art">'+(o.articles||'')+'</div>'+
   body+action+notes+
   (trigs?'<div class="lt-trig">'+L('依據 trigger：','Based on triggers: ')+trigs+'</div>':'')+'</div>';
}
function endHTML(){
  if(S.ended==="out") return '<div class="card"><div class="end"><div class="icon">✓</div>'+
    '<h2>'+L('不在歐盟電池法範圍','Outside the scope of the EU Battery Regulation')+'</h2><p>'+L('依你的回答，本案例與電池法無關，不需要進一步診斷。','Based on your answers, this case is not related to the Battery Regulation, so no further assessment is needed.')+'</p>'+
    '<button class="btn btn-ghost" onclick="back()">'+L('← 改上一題','← Edit previous answer')+'</button>'+
    '<button class="btn btn-primary" onclick="restart()">'+L('重新診斷','Start over')+'</button></div></div>';
  if(S.ended==="error") return '<div class="card"><div class="end"><div class="icon">⚠️</div>'+
    '<h2>'+L('連線發生問題','Connection problem')+'</h2><p>'+L('無法取得結果（','Could not retrieve the results (')+(S.fetchError||'')+L('）。請檢查網路或 Apps Script 部署存取權後重試。','). Please check your network or the Apps Script deployment access, then try again.')+'</p>'+
    '<button class="btn btn-primary" onclick="finish()">'+L('重新送出','Resend')+'</button></div></div>';
  var R=S.serverResults||{confirmed:[],needsMoreData:[],cannotDetermine:[]};
  function zone(title,arr,cls,zk){ if(!arr||!arr.length)return''; return '<div class="zone"><div class="zone-h '+cls+'">'+title+'（'+arr.length+'）</div>'+arr.map(function(o){return srvCard(o,zk);}).join('')+'</div>'; }
  var body=zone(L('確定適用','Confirmed applicable'),R.confirmed,'zc','confirmed')+zone(L('適用 — 建議補充資料','Applicable — more data recommended'),R.needsMoreData,'zn','needs')+zone(L('無法判斷（資料不足）','Cannot determine (insufficient data)'),R.cannotDetermine,'zx','cannot');
  var emailHtml='<div class="card" id="emailstep"><div class="email-h">'+L('把結果寄一份備份給自己','Email yourself a copy of the results')+'</div>'+
    '<input id="emailbox" type="email" placeholder="you@company.com">'+
    '<label class="consent"><input type="checkbox" id="consent"> '+L('我已閱讀並同意下述資料處理方式','I have read and agree to the data handling described below')+'</label>'+
    '<div class="privacy2">'+L('為寄送結果並保留紀錄，我們會儲存你的作答內容、系統算出的判斷結果與此 email，存放於受存取控制的雲端試算表，<b>保留 12 個月後自動刪除</b>；你可隨時來信要求提前刪除。本工具僅供初步自評，不構成法律意見。','To send your results and keep a record, we store your answers, the calculated results and this email address in an access-controlled cloud spreadsheet. <b>Data is deleted automatically after 12 months</b>; you can request earlier deletion by email at any time. This tool provides a preliminary self-assessment only and does not constitute legal advice.')+'</div>'+
    '<button class="btn btn-primary" onclick="realEmail()">'+L('寄送結果備份','Send a copy')+'</button></div>';
  var n=(R.confirmed||[]).length,m=(R.needsMoreData||[]).length,k=(R.cannotDetermine||[]).length;
  return '<div class="card"><div class="end" style="padding-bottom:6px"><div class="icon">📋</div>'+
    '<h2>'+L('初步合規診斷結果','Preliminary compliance results')+'</h2><div class="rpills" style="justify-content:center;margin-bottom:14px"><span class="rp rp1">'+L('確定適用 ','Confirmed ')+n+'</span><span class="rp rp2">'+L('建議補充 ','More data ')+m+'</span><span class="rp rp3">'+L('尚難判斷 ','Undetermined ')+k+'</span></div>'+
    '<p>'+L('以下為依你的作答比對 Legal Theme 的結果。','Below are the results of matching your answers against the Legal Themes.')+'</p></div>'+body+'</div>'+emailHtml+
    '<div class="actions" style="margin-top:4px"><button class="btn btn-ghost" onclick="restart()">'+L('↺ 再診斷另一顆電池','↺ Assess another battery')+'</button></div>';
}

 return '<div class="landing">'+

  '<div class="lcard">'+
   '<p>'+L('歐盟電池法橫跨碳足跡、再生料、電池護照到生產者責任，條文繁多、彼此牽動。我們把法規拆解成一套分階段診斷，帶貴公司從產品出發，逐步釐清哪些義務真正適用——讓第一步不必逐條翻法條。','The EU Battery Regulation spans carbon footprint, recycled content, the battery passport and producer responsibility — many interlinked articles. We break it into a staged assessment that starts from your product and works out which obligations actually apply, so your first step is not reading the law article by article.')+'</p>'+
   '<p><span class="lk">'+L('工具範圍：','Scope: ')+'</span>'+L('本次工具聚焦歐盟電池法下，ICT 業者可能涉及的產品、供應鏈與市場責任。回收處理業者相關責任、第三方驗證單位、主管機關或會員國的執行程序，則未納入工具判斷範圍。','This tool focuses on the product, supply-chain and market responsibilities that ICT operators may be subject to under the EU Battery Regulation. The responsibilities of recycling and waste-treatment operators, third-party verification bodies, and the enforcement procedures of competent authorities or Member States are not included in the tool\'s assessment scope.')+'</p>'+

   '<div class="rpills"><span class="rp rp1">'+L('確定適用','Confirmed applicable')+'</span><span class="rp rp2">'+L('建議補充','More data recommended')+'</span><span class="rp rp3">'+L('尚難判斷','Undetermined')+'</span></div>'+

function startTool(){ S.started=true; render(); }
function setLang(l){ S.lang=l; var x;
  x=document.getElementById('hTitle'); if(x)x.textContent=L('歐盟電池法 — 初步合規診斷','EU Battery Regulation — Preliminary Compliance Check');
  x=document.getElementById('hSub'); if(x)x.textContent=L('6 階段 · 約 10 分鐘完成 · 依作答自動跳題','6 stages · about 10 minutes · adapts to your answers');
  x=document.getElementById('footNote'); if(x)x.textContent=L('本工具提供初步自評，不構成法律意見；實際義務以最新法規與授權法規為準。© REnato lab','This tool provides a preliminary self-assessment, not legal advice; actual obligations depend on the latest regulation and delegated acts. © REnato lab');
  x=document.getElementById('langBtn'); if(x)x.textContent=S.lang==='zh'?'🌐 EN':'🌐 中文';
  render();
}
function toggleLang(){ setLang(S.lang==='zh'?'en':'zh'); }

function render(){
  var app=document.getElementById("app");
  if(!S.started){ app.innerHTML=landingHTML(); window.scrollTo(0,0); return; }
  if(S.ended){ app.innerHTML=progressHTML()+endHTML(); window.scrollTo(0,0); return; }
  var qs=stageQs(S.idx);
  var bodyq=qs.length?qs.map(qHTML).join(""):'<div class="q-hint" style="padding:10px 0">'+L('此階段依目前作答不適用。請點上方其他階段，或先補答前面的題目。','This stage does not apply based on your current answers. Tap another stage above, or complete the earlier questions first.')+'</div>';
  var nextLabel=S.idx===5?L("完成診斷 →","Finish →"):L("下一步 →","Next →");
  var stagehd=L('階段 ','Stage ')+(S.idx+1)+L('／6 · ',' / 6 · ')+stN(S.idx);
  var stagesub=S.lang==='en'?(stSub(S.idx)+' | '+qs.length+(qs.length===1?' question':' questions')):(stSub(S.idx)+'　|　本階段 '+qs.length+' 題');
  app.innerHTML=progressHTML()+'<div class="card"><div class="stagehd">'+stagehd+'</div><div class="stagesub">'+stagesub+'</div>'+bodyq+'</div>'+
    '<div class="nav"><button class="btn btn-ghost" onclick="back()" '+(S.hist.length?'':'style="visibility:hidden"')+'>'+L('← 上一步','← Back')+'</button>'+
    '<button class="btn btn-primary" onclick="next()" '+(canNext()?'':'disabled')+'>'+nextLabel+'</button></div>';
  applyHintToggles();
}
