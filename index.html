<style>

<header>
  <h1>歐盟電池法 — 初步合規診斷</h1>
  <p>ICT／電子產品 · 6 階段 · 約 6–10 分鐘完成（依作答自動跳題）</p>

<div class="wrap">
  <div id="app"></div>
  <div class="note">本工具提供初步自評，不構成法律意見；實際義務以最新法規與授權法規為準。© REnato lab</div>

<script>
/* ====== 設定（接 Apps Script）====== */
const GAS_URL='https://script.google.com/a/macros/renato-lab.com/s/AKfycbzuDMdMDPTya5ksi7dqjBxsZI3pASMfY1FaddiomB2gK8QircclpN1uB3b15YPz93Y_sw/exec';
const GAS_TOKEN='2026_eu_battery_regulation_v1';

/* ====== 6 Gate ====== */
const STAGES=[
 {n:"Entry｜範圍",sub:"先確認是否進入電池法診斷"},
 {n:"Object｜辨識分類",sub:"標的形態、是否儲能、電池類別"},
 {n:"Life｜生命階段",sub:"全新或二手／廢棄"},
 {n:"Route｜市場情境",sub:"EU 市場行為與客戶路徑"},
 {n:"Technical｜技術門檻",sub:"依電池類別問對應門檻"},
 {n:"Actor｜角色責任",sub:"供應鏈角色與責任"},
];

/* ====== 25 題（值＝canonical fact，直接餵 trigger）====== */
const has=(v,x)=>Array.isArray(v)&&v.includes(x);
const QS=[
 // G0 入口
 {id:"G0-Q01",s:0,trig:"—",type:"text",label:"本次診斷的案例／產品名稱或型號？",hint:"用來讓報告指向明確案例，可留空。",when:a=>true},
 {id:"G0-Q02",s:0,trig:"入口閘門",type:"single",label:"本案例是否與電池、含電池產品、電芯／模組、固定式儲能或廢電池有關？",
   hint:"先確認是否進入電池法診斷；若無關可直接結束。",
   opts:[{v:"yes",t:"是，有關"},{v:"no",t:"否，無關"},{v:"unknown",t:"不確定",unk:1}],when:a=>true},
 {id:"G0-Q03",s:0,trig:"路徑",type:"single",label:"本案例是否涉及 EU 市場、EU 客戶或關聯公司，或客戶因 EU 電池法要求提供資料？",
   hint:"判斷你與歐盟市場的關係（直接 / 僅客戶要資料 / 無關）。",
   opts:[{v:"direct EU route",t:"直接進入 EU 市場"},{v:"customer data request only",t:"僅客戶要求提供資料"},{v:"no EU relevance",t:"與 EU 無關"},{v:"unknown",t:"不確定",unk:1}],
   when:a=>a["G0-Q02"]==="yes"||a["G0-Q02"]==="unknown"},
 // G1 辨識與分類
 {id:"G1-Q01",s:1,trig:"form of supply",type:"single",label:"標的物最接近哪一種供應形式？",
   hint:"電池本身 vs 裝在成品裡，適用規則不同。",
   opts:[{v:"Standalone batteries",t:"獨立電池"},{v:"Batteries incorporated into products",t:"裝在成品裡（筆電/手機等）"},{v:"Battery cells or battery modules made available for end use",t:"電芯／模組（供最終用途）"},{v:"unknown",t:"其他或不確定",unk:1}],
   when:a=>!!a["G0-Q03"]},
 {id:"G1-Q02",s:1,trig:"stationary BESS",type:"single",label:"標的是否為固定式儲能系統（stationary BESS）？",
   hint:"固定式儲能要單獨判斷（影響儲能安全與 BMS）。",
   opts:[{v:"yes",t:"是"},{v:"no",t:"否"},{v:"unknown",t:"不確定",unk:1}],when:a=>!!a["G1-Q01"]},
 {id:"G1-Q03",s:1,trig:"categories of batteries",type:"single",label:"標的電池屬於哪一種電池類別？",
   hint:"單選；決定後面哪些技術門檻會出現。",
   opts:[{v:"portable battery",t:"攜帶式 Portable"},{v:"LMT battery",t:"LMT 輕型載具"},{v:"SLI battery",t:"SLI 啟動電池"},{v:"industrial battery",t:"工業 Industrial"},{v:"electric vehicle battery",t:"EV 電動車"},{v:"unknown",t:"不確定",unk:1}],
   when:a=>!!a["G1-Q02"]},
 // G2 生命階段
 {id:"G2-Q01",s:2,trig:"battery life stage",type:"single",label:"電池目前的生命階段？",
   hint:"全新與二手／廢棄適用義務不同。",
   opts:[{v:"new",t:"全新 new"},{v:"used",t:"二手 used"},{v:"waste",t:"廢棄 waste"},{v:"fraction",t:"廢料 fraction"},{v:"unknown",t:"不確定",unk:1}],when:a=>!!a["G1-Q03"]},
 {id:"G2-Q02",s:2,trig:"二次生命（context）",type:"multi",label:"二手／廢棄的來源或目前處理狀態？",
   hint:"判斷 second-life；可複選。",
   opts:[{v:"reuse route",t:"再使用"},{v:"repurposing route",t:"改作他用"},{v:"remanufacturing route",t:"再製造"},{v:"preparation for re-use",t:"再使用準備"},{v:"preparation for repurposing",t:"再用途化準備"},{v:"preparation for recycling",t:"回收準備"},{v:"sorting",t:"分選"},{v:"other",t:"其他"},{v:"unknown",t:"不確定",unk:1}],
   when:a=>["used","waste","fraction"].includes(a["G2-Q01"])},
 {id:"G2-Q03",s:2,trig:"重入市場（context）",type:"single",label:"是否預計重新進入市場或投入使用？",
   hint:"影響狀態轉換與重入市場責任。",
   opts:[{v:"yes",t:"是"},{v:"no",t:"否"},{v:"unknown",t:"不確定",unk:1}],when:a=>["used","waste"].includes(a["G2-Q01"])},
 // G3 市場情境
 {id:"G3-Q01",s:3,trig:"路徑（context）",type:"single",label:"你（或相關 EU entity）是直接 EU 市場行為，還是僅支援客戶資料要求？",
   hint:"界定你是直接責任主體或支援角色。",
   opts:[{v:"direct EU market route",t:"直接 EU 市場行為"},{v:"support-only customer request",t:"僅支援客戶要資料"},{v:"no route",t:"皆非"},{v:"unknown",t:"不確定",unk:1}],when:a=>!!a["G2-Q01"]},
 {id:"G3-Q02",s:3,trig:"market deployment actions",type:"multi",label:"本案例涉及哪些 EU 市場行為？",
   hint:"投放／提供／投入使用；可複選。",
   opts:[{v:"placing on the market",t:"投放市場 placing"},{v:"making available on the market",t:"提供販售 making available"},{v:"putting into service",t:"投入使用 putting into service"},{v:"none of these",t:"皆無"},{v:"unknown",t:"不確定",unk:1}],when:a=>!!a["G3-Q01"]},
 // G4 技術門檻
 {id:"G4-Q01",s:4,trig:"industrial battery charge",type:"single",label:"工業電池是否為可充電？",
   hint:"碳足跡／性能對工業電池常以可充電為前提。",
   opts:[{v:"rechargeable",t:"可充電"},{v:"non-rechargeable",t:"不可充電"},{v:"unknown",t:"不確定",unk:1}],when:a=>a["G1-Q03"]==="industrial battery"},
 {id:"G4-Q02",s:4,trig:"industrial battery capacity",type:"single",label:"工業電池容量是否大於 2 kWh？",
   hint:"多個義務以 2 kWh 為門檻。只需級距。",
   opts:[{v:"capacity greater than 2 kWh",t:"＞ 2 kWh"},{v:"capacity not greater than 2 kWh",t:"≤ 2 kWh"},{v:"unknown",t:"不確定",unk:1}],when:a=>a["G1-Q03"]==="industrial battery"},
 {id:"G4-Q03",s:4,trig:"industrial battery external",type:"single",label:"工業電池是否屬於「僅外接儲存」exclusively external storage？",
   hint:"影響再生含量判斷。",
   opts:[{v:"with exclusively external storage",t:"是，僅外接儲存"},{v:"without exclusively external storage",t:"否"},{v:"unknown",t:"不確定",unk:1}],when:a=>a["G1-Q03"]==="industrial battery"},
 {id:"G4-Q04",s:4,trig:"portable battery general",type:"single",label:"攜帶式電池是否為「一般用途」？",
   hint:"用於性能與耐久度判斷。",
   opts:[{v:"yes",t:"是"},{v:"no",t:"否"},{v:"unknown",t:"不確定",unk:1}],when:a=>a["G1-Q03"]==="portable battery"},
 {id:"G4-Q05",s:4,trig:"button cell",type:"single",label:"攜帶式電池是否為鈕扣電池 button cell？",
   hint:"button cell 會排除部分性能要求。",
   opts:[{v:"yes",t:"是"},{v:"no",t:"否"},{v:"unknown",t:"不確定",unk:1}],when:a=>a["G1-Q03"]==="portable battery"},
 {id:"G4-Q06",s:4,trig:"active materials",type:"multi",label:"電池活性材料是否含下列金屬？",
   hint:"用於再生含量（LT07）；可複選。",
   opts:[{v:"cobalt",t:"鈷 Co"},{v:"lead",t:"鉛 Pb"},{v:"lithium",t:"鋰 Li"},{v:"nickel",t:"鎳 Ni"},{v:"none of these",t:"皆無"},{v:"unknown",t:"不確定",unk:1}],
   when:a=>["electric vehicle battery","SLI battery","LMT battery","industrial battery"].includes(a["G1-Q03"])},
 {id:"G4-Q07",s:4,trig:"removability exempt",type:"single",label:"裝在成品裡的電池，是否符合「可不拆卸」豁免條件？",
   hint:"防水/醫療/不可斷電等可豁免。",
   opts:[{v:"yes",t:"符合豁免"},{v:"no",t:"不符合"},{v:"unknown",t:"不確定",unk:1}],
   when:a=>a["G1-Q01"]==="Batteries incorporated into products"&&["portable battery","LMT battery"].includes(a["G1-Q03"])},
 // G5 角色責任
 {id:"G5-Q01",s:5,trig:"product supply chain actor",type:"single",label:"你（或相關 EU entity）最接近哪一種供應鏈角色？",
   hint:"以本案例的 EU 市場/客戶情境回答。",
   opts:[{v:"manufacturer",t:"製造商"},{v:"authorised representative",t:"授權代表"},{v:"importer",t:"進口商"},{v:"distributor",t:"經銷商"},{v:"fulfilment service provider",t:"履約服務商"},{v:"intermediary service provider under the e-commerce directive",t:"電商中介服務商"},{v:"end-user",t:"終端使用者"},{v:"support-only supplier",t:"純支援供應商"},{v:"unknown",t:"不確定",unk:1}],when:a=>!!a["G3-Q02"]},
 {id:"G5-Q02",s:5,trig:"economic operator",type:"single",label:"本企業或相關 EU entity 是否為 economic operator？",
   hint:"不熟悉這個詞可選不確定。",
   opts:[{v:"yes",t:"是"},{v:"no",t:"否"},{v:"unknown",t:"不確定",unk:1}],when:a=>!!a["G5-Q01"]},
 {id:"G5-Q03",s:5,trig:"suppliers of cells/modules",type:"single",label:"是否作為電芯／模組供應商，供應給電池製造商？",
   hint:"供應鏈角色，與供應形式不同。",
   opts:[{v:"yes",t:"是"},{v:"no",t:"否"},{v:"unknown",t:"不確定",unk:1}],when:a=>!!a["G5-Q02"]},
 {id:"G5-Q04",s:5,trig:"Art.44（context）",type:"single",label:"身為進口商／經銷商，是否有自有品牌、改裝電池或改變用途？",
   hint:"可能被視為製造商而承擔其責任。",
   opts:[{v:"yes",t:"是"},{v:"no",t:"否"},{v:"not applicable",t:"不適用"},{v:"unknown",t:"不確定",unk:1}],when:a=>["importer","distributor"].includes(a["G5-Q01"])},
 {id:"G5-Q05",s:5,trig:"producers",type:"single",label:"本企業或相關 EU entity 是否為 producer？",
   hint:"EPR 生產者；含製造、進口、貼牌、電商。",
   opts:[{v:"yes",t:"是"},{v:"no",t:"否"},{v:"unknown",t:"不確定",unk:1}],when:a=>!!a["G5-Q03"]},
 {id:"G5-Q06",s:5,trig:"PRO appointed by producer",type:"single",label:"是否已指定生產者責任組織（PRO）代為履責？",
   hint:"影響資訊揭露、收集目標、申報由誰處理。",
   opts:[{v:"yes",t:"是"},{v:"no",t:"否"},{v:"unknown",t:"不確定",unk:1}],when:a=>["yes","unknown"].includes(a["G5-Q05"])},
 {id:"G5-Q07",s:5,trig:"net turnover",type:"single",label:"企業淨營業額是否 ≥ €40M？",
   hint:"盡職調查門檻。只需級距。",
   opts:[{v:"less than EUR 40 million",t:"< €40M"},{v:"no less than EUR 40 million",t:"≥ €40M"},{v:"unknown",t:"不確定",unk:1}],when:a=>["yes","unknown"].includes(a["G5-Q02"])},
];

const S={a:{},idx:0,skipped:new Set(),ended:null,hist:[],started:false};
function pick(id,v){ S.a[id]=v; render(); }
function toggle(id,v){ const arr=S.a[id]||(S.a[id]=[]); const i=arr.indexOf(v); if(i>=0)arr.splice(i,1); else arr.push(v); render(); }
function setText(id,v){ S.a[id]=v; }
function stageQs(s){ return QS.filter(q=>q.s===s && q.when(S.a)); }
function stageApplicable(s){ return stageQs(s).length>0; }

function optHTML(q){
  if(q.type==="text"){ var val=S.a[q.id]?String(S.a[q.id]).replace(/"/g,'&quot;'):""; return '<input type="text" value="'+val+'" oninput="setText(\''+q.id+'\',this.value)" placeholder="選填">'; }
  return '<div class="opts">'+q.opts.map(function(o){
    var sel = q.type==="multi" ? ((S.a[q.id]||[]).includes(o.v)?"sel":"") : (S.a[q.id]===o.v?"sel":"");
    var unk=o.unk?"unk":""; var fn=q.type==="multi"?"toggle('"+q.id+"','"+o.v+"')":"pick('"+q.id+"','"+o.v+"')";
    return '<div class="opt '+sel+' '+unk+'" onclick="'+fn+'">'+o.t+'</div>';
  }).join("")+'</div>';
}
function qHTML(q){
  var multi=q.type==="multi"?'<span class="multi-tag">可複選</span>':"";
  return '<div class="q"><div class="qid">'+q.id+' · '+q.trig+'</div><div class="q-label">'+q.label+multi+'</div><span class="q-hint">'+q.hint+'</span>'+optHTML(q)+'</div>';
}
function canNext(){ return stageQs(S.idx).every(function(q){ if(q.type==="text")return true; if(q.type==="multi")return (S.a[q.id]||[]).length>0; return !!S.a[q.id]; }); }
function outOfScope(){ return S.a["G0-Q02"]==="no"; }
function jumpTo(i){ if(i===S.idx&&!S.ended)return; if(!S.ended)S.hist.push(S.idx); S.ended=null; S.idx=i; render(); }
function stageComplete(i){ var qs=stageQs(i); if(!qs.length)return false; return qs.every(function(q){ if(q.type==="text")return true; if(q.type==="multi")return (S.a[q.id]||[]).length>0; return !!S.a[q.id]; }); }
function next(){
  if(S.idx===0 && outOfScope()){ S.ended="out"; return render(); }
  [...S.skipped].forEach(function(x){ if(x>S.idx)S.skipped.delete(x); });
  var j=S.idx+1;
  while(j<6 && !stageApplicable(j)){ S.skipped.add(j); j++; }
  if(j>=6){ return finish(); }
  S.hist.push(S.idx); S.idx=j; render();
}
function back(){ if(S.ended){S.ended=null;return render();} if(S.hist.length){S.idx=S.hist.pop();render();} }
function restart(){ S.a={};S.idx=0;S.skipped=new Set();S.ended=null;S.hist=[];S.serverResults=null;render(); }

function progressHTML(){
  var bar='<div class="progress">'+STAGES.map(function(st,i){
    var cls,label=st.n;
    if(!stageApplicable(i)){cls="skipped";label=st.n+"·略過";}
    else if(i===S.idx&&!S.ended)cls="current";
    else if(stageComplete(i))cls="done"; else cls="upcoming";
    return '<div class="pstep '+cls+'" onclick="jumpTo('+i+')"><div class="pbar"></div>'+label+'</div>';
  }).join("")+'</div>';
  return bar+'<div class="phint">↑ 可點階段自由切換（綠＝已填、灰斜線＝目前不適用）</div>';
}

/* ====== 送 Apps Script 算 ====== */
function collectApplicable(){ var m={}; QS.forEach(function(q){ m[q.id]=!!q.when(S.a); }); return m; }
function finish(){
  document.getElementById('app').innerHTML=progressHTML()+'<div class="card"><div class="end"><div class="icon">⏳</div><h2>計算中…</h2><p>正在送出作答並比對 Legal Theme，請稍候。</p></div></div>';
  window.scrollTo(0,0);
  fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({token:GAS_TOKEN,caseName:S.a['G0-Q01']||'',answers:S.a,applicable:collectApplicable()})})
   .then(function(r){return r.json();})
   .then(function(data){if(data.error)throw new Error(data.error);S.serverResults=data.results;S.resultId=data.resultId;S.ended='complete';render();})
   .catch(function(err){S.fetchError=String(err);S.ended='error';render();});
}
function realEmail(){
  var ok=document.getElementById('consent').checked;var em=document.getElementById('emailbox').value.trim();
  if(!ok){alert('請先勾選同意資料處理方式');return;}
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(em)){alert('請輸入有效 email');return;}
  document.getElementById('emailstep').innerHTML='<div class="emaildone">寄送中…</div>';
  var summary=(S.serverResults&&S.serverResults.confirmed?S.serverResults.confirmed.map(function(x){return x.id;}).join(', '):'');
  fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({token:GAS_TOKEN,action:'email',email:em,resultId:S.resultId,summary:'確定適用：'+summary})})
   .then(function(){document.getElementById('emailstep').innerHTML='<div class="emaildone">✓ 已寄至 '+em+'，並記錄於 log。</div>';})
   .catch(function(){document.getElementById('emailstep').innerHTML='<div class="emaildone" style="color:#c0392b">寄送失敗，請稍後再試。</div>';});
}
function srvCard(o,zone){
  var trigs=(o.triggers||[]).join('、');
  var why=zone==='confirmed'?'<div class="why2">為何命中：'+((o.why||[]).join('；')||'—')+'</div>':'';
  var note='';
  if(zone==='needs')note='<div class="note2">補充以下次要資料可更準確：'+((o.refine||[]).join('、')||'—')+'</div>';
  if(zone==='cannot')note='<div class="note2">缺少判斷依據：'+((o.missing||[]).join('、')||'—')+'</div>';
  return '<div class="lt '+zone+'"><div class="lt-h"><b>'+o.id+'</b> '+o.name+'</div>'+
   '<div class="lt-art">'+(o.articles||'')+'</div><div class="lt-desc">'+(o.desc||'')+'</div>'+
   (o.responsibilities?'<div class="lt-resp">'+o.responsibilities+'</div>':'')+why+note+
   (trigs?'<div class="lt-trig">依據 trigger：'+trigs+'</div>':'')+'</div>';
}
function endHTML(){
  if(S.ended==="out") return '<div class="card"><div class="end"><div class="icon">✓</div>'+
    '<h2>不在歐盟電池法範圍</h2><p>依你的回答，本案例與電池法無關，不需要進一步診斷。</p>'+
    '<button class="btn btn-ghost" onclick="back()">← 改上一題</button>'+
    '<button class="btn btn-primary" onclick="restart()">重新診斷</button></div></div>';
  if(S.ended==="error") return '<div class="card"><div class="end"><div class="icon">⚠️</div>'+
    '<h2>連線發生問題</h2><p>無法取得結果（'+(S.fetchError||'')+'）。請檢查網路或 Apps Script 部署存取權後重試。</p>'+
    '<button class="btn btn-primary" onclick="finish()">重新送出</button></div></div>';
  var R=S.serverResults||{confirmed:[],needsMoreData:[],cannotDetermine:[]};
  function zone(title,arr,cls,zk){ if(!arr||!arr.length)return''; return '<div class="zone"><div class="zone-h '+cls+'">'+title+'（'+arr.length+'）</div>'+arr.map(function(o){return srvCard(o,zk);}).join('')+'</div>'; }
  var body=zone('確定適用',R.confirmed,'zc','confirmed')+zone('適用 — 建議補充資料',R.needsMoreData,'zn','needs')+zone('無法判斷（資料不足）',R.cannotDetermine,'zx','cannot');
  var emailHtml='<div class="card" id="emailstep"><div class="email-h">把結果寄一份備份給自己</div>'+
    '<input id="emailbox" type="email" placeholder="you@company.com">'+
    '<label class="consent"><input type="checkbox" id="consent"> 我已閱讀並同意下述資料處理方式</label>'+
    '<div class="privacy2">為寄送結果並保留紀錄，我們會儲存你的作答內容、系統算出的判斷結果與此 email，'+
    '存放於受存取控制的雲端試算表，<b>保留 12 個月後自動刪除</b>；你可隨時來信要求提前刪除。本工具僅供初步自評，不構成法律意見。</div>'+
    '<button class="btn btn-primary" onclick="realEmail()">寄送結果備份</button></div>';
  var n=(R.confirmed||[]).length,m=(R.needsMoreData||[]).length,k=(R.cannotDetermine||[]).length;
  return '<div class="card"><div class="end" style="padding-bottom:6px"><div class="icon">📋</div>'+
    '<h2>初步合規診斷結果</h2><span class="count">確定適用 '+n+'｜建議補充 '+m+'｜無法判斷 '+k+'</span>'+
    '<p>以下為依你的作答比對 Legal Theme 的結果。</p></div>'+body+'</div>'+emailHtml+
    '<div class="actions" style="margin-top:4px"><button class="btn btn-ghost" onclick="restart()">↺ 再診斷另一顆電池</button></div>';
}

/* ====== 入口頁（單一卡片）====== */
function landingHTML(){
 return '<div class="landing">'+
  '<div class="lhero"><div class="licon">🔋</div>'+
  '<h1>歐盟電池法 — 初步合規診斷</h1>'+
  '<p class="lsub">約 6–10 分鐘，初步判斷你的產品是否受 EU 2023/1542 規範、涉及哪些義務（Legal Theme）。</p>'+
  '<button class="btn btn-primary lbtn" onclick="startTool()">開始診斷 →</button></div>'+
  '<div class="lcard">'+
   '<p>企業要判斷自己是否受歐盟電池法規範、涉及哪些義務，通常需要顧問逐條解讀，門檻高、耗時。本工具用<span class="lk">分階段問答</span>，依決策樹自動判斷適用的 Legal Theme，產出初步風險畫像，作為後續諮詢的起點。</p>'+
   '<p><span class="lk">適合誰用：</span>ICT／電子產品企業（筆電、手機、網通設備、IoT 裝置，以及電芯／模組／零組件供應商）。回答約 10–20 題（依產品自動跳題），系統把答案轉成法規 trigger、比對各 Legal Theme 的啟動條件，輸出「確定適用 / 建議補充資料 / 無法判斷」三類結果。</p>'+
   '<p class="ldisc">本工具由 <b>REnato lab</b> 研究開發，法律依據為 Regulation (EU) 2023/1542；僅提供初步自評，不構成法律意見，實際義務以最新法規與授權法規為準。聯絡：<a href="mailto:info@renato-lab.com">info@renato-lab.com</a></p>'+
  '</div>'+
  '<button class="btn btn-primary lbtn2" style="display:block;margin:0 auto;padding:13px 30px" onclick="startTool()">開始診斷 →</button></div>';
}
function startTool(){ S.started=true; render(); }

function render(){
  var app=document.getElementById("app");
  if(!S.started){ app.innerHTML=landingHTML(); window.scrollTo(0,0); return; }
  if(S.ended){ app.innerHTML=progressHTML()+endHTML(); window.scrollTo(0,0); return; }
  var st=STAGES[S.idx], qs=stageQs(S.idx);
  var bodyq=qs.length?qs.map(qHTML).join(""):'<div class="q-hint" style="padding:10px 0">此階段依目前作答不適用。請點上方其他階段，或先補答前面的題目。</div>';
  var nextLabel=S.idx===5?"完成診斷 →":"下一步 →";
  app.innerHTML=progressHTML()+'<div class="card"><div class="stagehd">階段 '+(S.idx+1)+'／6 · '+st.n+'</div><div class="stagesub">'+st.sub+'　|　本階段 '+qs.length+' 題</div>'+bodyq+'</div>'+
    '<div class="nav"><button class="btn btn-ghost" onclick="back()" '+(S.hist.length?'':'style="visibility:hidden"')+'>← 上一步</button>'+
    '<button class="btn btn-primary" onclick="next()" '+(canNext()?'':'disabled')+'>'+nextLabel+'</button></div>';
}
render();
</script>
