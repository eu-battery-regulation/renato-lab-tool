<script>
/* ===== 6 階段 ===== */
const STAGES = [
  {n:"電池辨識", sub:"先確認是不是電池、哪一類、怎麼供應"},

  {n:"EPR／盡職調查", sub:"生產者責任與盡職調查門檻"},

/* ===== 25 題題庫（trigger 為引擎事實；when 為跳題條件）===== */
const has=(v,x)=>Array.isArray(v)&&v.includes(x);
const QS = [
 // 階段 1
 {id:"Q-S1-000",s:0,trig:"none",type:"text",label:"這次要診斷的產品／電池／產品線名稱是？",hint:"用來讓報告指向明確案例，非法規判斷。可留空。",when:a=>true},
 {id:"Q-S1-001",s:0,trig:"categories of batteries",type:"multi",
   label:"這個案例的電池屬於哪一（幾）類？",hint:"同一產品含多種電池可複選；決定後面哪些義務會啟動。",
   opts:[{v:"portable",t:"攜帶式（手機/筆電等）"},{v:"lmt",t:"LMT 輕型載具"},{v:"sli",t:"SLI 啟動電池"},{v:"ev",t:"EV 電動車"},{v:"industrial",t:"工業（資料中心儲能等）"},{v:"none",t:"不是電池、也不含電池",none:1},{v:"unknown",t:"不確定",unk:1}],when:a=>true},
 {id:"Q-S1-002",s:0,trig:"form of supply",type:"single",
   label:"供應形式（form of supply）是哪一種？",hint:"電池本身 vs 裝在成品裡，適用規則不同（成品有可拆換要求）。",
   opts:[{v:"standalone",t:"獨立電池"},{v:"incorporated",t:"裝在成品裡（如筆電/手機）"},{v:"cellmodule",t:"電芯/模組（供下一階製造）"},{v:"unknown",t:"不確定",unk:1}],when:a=>has(a["Q-S1-001"],"portable")||has(a["Q-S1-001"],"lmt")||has(a["Q-S1-001"],"sli")||has(a["Q-S1-001"],"ev")||has(a["Q-S1-001"],"industrial")||has(a["Q-S1-001"],"unknown")},
 {id:"Q-S1-003",s:0,trig:"stationary BESS",type:"single",
   label:"這是否為固定式儲能系統（stationary BESS）？",hint:"固定式儲能要單獨判斷（影響儲能安全與 BMS 要求）。",
   opts:[{v:"yes",t:"是"},{v:"no",t:"否"},{v:"unknown",t:"不確定",unk:1}],when:a=>!!a["Q-S1-002"]},
 // 階段 2
 {id:"Q-S1-004",s:1,trig:"battery life stage",type:"single",
   label:"電池目前的生命階段是？",hint:"全新與二手／翻新適用義務不同；多數 ICT 是全新品。",
   opts:[{v:"new",t:"全新"},{v:"used",t:"二手／使用過"},{v:"waste",t:"廢棄"},{v:"fraction",t:"廢料分支 fraction"},{v:"unknown",t:"不確定",unk:1}],when:a=>!!a["Q-S1-002"]},
 {id:"Q-S1-005",s:1,trig:"used battery source",type:"multi",
   label:"這批二手電池的來源／處置是？",hint:"判斷 second-life；可複選。",
   opts:[{v:"reuse",t:"再使用 reuse"},{v:"repurposed",t:"改作他用 repurposed"},{v:"remanufactured",t:"再製造 remanufactured"},{v:"unknown",t:"不確定",unk:1}],when:a=>a["Q-S1-004"]==="used"},
 {id:"Q-S1-006",s:1,trig:"treatment actions",type:"multi",
   label:"這顆電池是否經過下列處理？",hint:"判斷狀態轉換與重入市場責任；可複選。",
   opts:[{v:"sorting",t:"分選 sorting"},{v:"prep-reuse",t:"再使用準備"},{v:"prep-repurpose",t:"再用途化準備"},{v:"remanufacture",t:"再製造"},{v:"none",t:"皆無"},{v:"unknown",t:"不確定",unk:1}],when:a=>a["Q-S1-004"]==="used"||a["Q-S1-004"]==="waste"},
 // 階段 3
 {id:"Q-S1-007",s:2,trig:"market deployment actions",type:"multi",
   label:"電池是否在 EU 發生下列市場行為？",hint:"是否投放/提供/投入使用，決定市場相關義務；可複選。",
   opts:[{v:"placing",t:"投放市場 placing"},{v:"available",t:"提供販售 making available"},{v:"service",t:"投入使用 putting into service"},{v:"none",t:"皆無"},{v:"unknown",t:"不確定",unk:1}],when:a=>!!a["Q-S1-004"]},
 // 階段 4
 {id:"Q-S1-008",s:3,trig:"product supply chain actor",type:"multi",
   label:"你（或你的 EU 關係企業）在供應鏈是哪些角色？",hint:"以本案例的 EU 市場/客戶情境回答；可複選。",
   opts:[{v:"manufacturer",t:"製造商"},{v:"authrep",t:"授權代表"},{v:"importer",t:"進口商"},{v:"distributor",t:"經銷商"},{v:"fulfilment",t:"履約服務商"},{v:"none",t:"皆非"},{v:"unknown",t:"不確定",unk:1}],when:a=>!!a["Q-S1-007"]},
 {id:"Q-S1-009A",s:3,trig:"economic operator",type:"single",
   label:"你是否自認符合 economic operator？",hint:"不熟悉這個詞就選不確定，下一題會用具體行為推導。",
   opts:[{v:"yes",t:"是"},{v:"no",t:"否"},{v:"unknown",t:"不確定",unk:1}],when:a=>!!a["Q-S1-008"]},
 {id:"Q-S1-009B",s:3,trig:"economic operator",type:"multi",
   label:"以下符合哪些？（用來推導 economic operator）",hint:"符合任一項，系統就推導為 economic operator；可複選。",
   opts:[{v:"manufacturer",t:"製造商"},{v:"importer",t:"進口商"},{v:"distributor",t:"經銷商"},{v:"authrep",t:"授權代表"},{v:"none",t:"皆非"},{v:"unknown",t:"不確定",unk:1}],when:a=>!!a["Q-S1-009A"]},
 {id:"Q-S1-010",s:3,trig:"suppliers of cells/modules",type:"single",
   label:"你是否為電芯／電池模組供應商？",hint:"供應鏈角色，與供應形式不同。",
   opts:[{v:"yes",t:"是"},{v:"no",t:"否"},{v:"unknown",t:"不確定",unk:1}],when:a=>!!a["Q-S1-009B"]},
 {id:"Q-S1-011",s:3,trig:"supplementary（Art.44 轉換）",type:"multi",
   label:"身為進口商/經銷商，是否有以自己名義從事下列行為？",hint:"可能被視為製造商而承擔其責任；可複選。",
   opts:[{v:"ownbrand",t:"自有品牌販售"},{v:"modify",t:"改裝電池"},{v:"changeuse",t:"改變預定用途"},{v:"none",t:"皆無"},{v:"unknown",t:"不確定",unk:1}],when:a=>has(a["Q-S1-008"],"importer")||has(a["Q-S1-008"],"distributor")},
 // 階段 5
 {id:"Q-S1-012",s:4,trig:"portable battery general",type:"single",
   label:"攜帶式電池是否為「一般用途」？",hint:"用於性能與耐久度（LT09）判斷。",
   opts:[{v:"yes",t:"是"},{v:"no",t:"否"},{v:"unknown",t:"不確定",unk:1}],when:a=>has(a["Q-S1-001"],"portable")},
 {id:"Q-S1-013",s:4,trig:"button cell",type:"single",
   label:"攜帶式電池是否為鈕扣電池 button cell？",hint:"button cell 會排除部分性能要求。",
   opts:[{v:"yes",t:"是"},{v:"no",t:"否"},{v:"unknown",t:"不確定",unk:1}],when:a=>has(a["Q-S1-001"],"portable")},
 {id:"Q-S1-014",s:4,trig:"industrial battery charge",type:"single",
   label:"工業電池是否可充電？",hint:"碳足跡/性能對工業電池常以可充電為前提。",
   opts:[{v:"rechargeable",t:"可充電"},{v:"non",t:"不可充電"},{v:"unknown",t:"不確定",unk:1}],when:a=>has(a["Q-S1-001"],"industrial")},
 {id:"Q-S1-015",s:4,trig:"industrial battery capacity",type:"single",
   label:"工業電池容量是否大於 2 kWh？",hint:"多個義務（碳足跡、護照）以 2 kWh 為門檻。只需級距。",
   opts:[{v:"gt2",t:"＞ 2 kWh"},{v:"le2",t:"≤ 2 kWh"},{v:"unknown",t:"不確定",unk:1}],when:a=>has(a["Q-S1-001"],"industrial")},
 {id:"Q-S1-016",s:4,trig:"industrial battery external",type:"single",
   label:"工業電池是否「僅外接儲存」exclusively external storage？",hint:"影響再生含量（LT07）判斷。",
   opts:[{v:"with",t:"是，僅外接儲存"},{v:"without",t:"否"},{v:"unknown",t:"不確定",unk:1}],when:a=>has(a["Q-S1-001"],"industrial")},
 {id:"Q-S1-017",s:4,trig:"active materials",type:"multi",
   label:"電池活性材料是否含下列任一金屬？",hint:"用於再生含量（LT07 Art.8）；可複選。",
   opts:[{v:"cobalt",t:"鈷 Co"},{v:"lead",t:"鉛 Pb"},{v:"lithium",t:"鋰 Li"},{v:"nickel",t:"鎳 Ni"},{v:"none",t:"皆無"},{v:"unknown",t:"不確定",unk:1}],when:a=>has(a["Q-S1-001"],"ev")||has(a["Q-S1-001"],"sli")||has(a["Q-S1-001"],"lmt")||has(a["Q-S1-001"],"industrial")},
 {id:"Q-S1-018",s:4,trig:"removability exemption",type:"single",
   label:"裝在成品裡的電池，是否符合「可不拆卸」豁免條件？",hint:"防水/醫療/不可斷電等可豁免；否則須讓使用者可自行更換。",
   opts:[{v:"yes",t:"符合豁免"},{v:"no",t:"不符合"},{v:"unknown",t:"不確定",unk:1}],when:a=>a["Q-S1-002"]==="incorporated"&&(has(a["Q-S1-001"],"portable")||has(a["Q-S1-001"],"lmt"))},
 // 階段 6
 {id:"Q-S1-019A",s:5,trig:"supports producers",type:"single",
   label:"是否在某個 EU 會員國「首次供應（first making available）」電池？",hint:"EPR 生產者判斷以會員國為單位。",
   opts:[{v:"yes",t:"是"},{v:"no",t:"否"},{v:"unknown",t:"不確定",unk:1}],when:a=>!!a["Q-S1-007"]&&!!a["Q-S1-008"]},
 {id:"Q-S1-019B",s:5,trig:"producers",type:"multi",
   label:"符合哪一種 producer 身分？（用來推導生產者）",hint:"以具體行為推導；可複選。",
   opts:[{v:"ownname",t:"以自有名義製造電池"},{v:"resell",t:"轉售他人製造的電池"},{v:"import",t:"進口並首次供應"},{v:"none",t:"皆非"},{v:"unknown",t:"不確定",unk:1}],when:a=>a["Q-S1-019A"]==="yes"||a["Q-S1-019A"]==="unknown"},
 {id:"Q-S1-019C",s:5,trig:"supplementary（會員國別）",type:"text",
   label:"涉及哪些 EU 會員國？（可留空）",hint:"EPR 義務按會員國註冊履責，保留國別上下文。",when:a=>a["Q-S1-019A"]==="yes"||a["Q-S1-019A"]==="unknown"},
 {id:"Q-S1-020",s:5,trig:"PRO appointed by producer",type:"single",
   label:"是否已由 producer 指定 PRO（生產者責任組織）代為履責？",hint:"影響資訊揭露、收集目標、申報由誰處理。",
   opts:[{v:"yes",t:"是"},{v:"no",t:"否"},{v:"unknown",t:"不確定",unk:1}],when:a=>a["Q-S1-019A"]==="yes"||a["Q-S1-019A"]==="unknown"},
 {id:"Q-S1-021",s:5,trig:"net turnover",type:"single",
   label:"公司／相關 economic operator 的淨營業額？",hint:"盡職調查（LT19）對 < €40M 有豁免。只需級距。",
   opts:[{v:"lt40",t:"< €40M"},{v:"ge40",t:"≥ €40M"},{v:"unknown",t:"不確定",unk:1}],when:a=>a["Q-S1-009A"]==="yes"||(Array.isArray(a["Q-S1-009B"])&&a["Q-S1-009B"].some(x=>x!=="none"&&x!=="unknown"))},
];

const S={a:{},idx:0,skipped:new Set(),ended:null,hist:[],started:false};
function pick(id,v){ S.a[id]=v; render(); }
function toggle(id,v){ const arr=S.a[id]||(S.a[id]=[]); const i=arr.indexOf(v); if(i>=0)arr.splice(i,1); else arr.push(v); render(); }
function setText(id,v){ S.a[id]=v; }
function stageQs(s){ return QS.filter(q=>q.s===s && q.when(S.a)); }
function stageApplicable(s){ return stageQs(s).length>0; }

function optHTML(q){
  if(q.type==="text"){
    const val=S.a[q.id]?String(S.a[q.id]).replace(/"/g,'&quot;'):"";
    return `<input type="text" value="${val}" oninput="setText('${q.id}',this.value)" placeholder="選填">`;
  }
  return `<div class="opts">`+q.opts.map(o=>{
    let sel;
    if(q.type==="multi") sel=(S.a[q.id]||[]).includes(o.v)?"sel":"";
    else sel=S.a[q.id]===o.v?"sel":"";
    const unk=o.unk?"unk":"";
    const fn=q.type==="multi"?`toggle('${q.id}','${o.v}')`:`pick('${q.id}','${o.v}')`;
    return `<div class="opt ${sel} ${unk}" onclick="${fn}">${o.t}</div>`;
  }).join("")+`</div>`;
}
function qHTML(q){
  const multi=q.type==="multi"?`<span class="multi-tag">可複選</span>`:"";
  return `<div class="q"><div class="qid">${q.id} · ${q.trig}</div>
    <div class="q-label">${q.label}${multi}</div>
    <span class="q-hint">${q.hint}</span>${optHTML(q)}</div>`;
}

function canNext(){
  return stageQs(S.idx).every(q=>{
    if(q.type==="text") return true;
    if(q.type==="multi") return (S.a[q.id]||[]).length>0;
    return !!S.a[q.id];
  });
}
function outOfScope(){ const c=S.a["Q-S1-001"]; return Array.isArray(c)&&c.length===1&&c[0]==="none"; }

function next(){
  if(S.idx===0 && outOfScope()){ S.ended="out"; return render(); }
  [...S.skipped].forEach(x=>{ if(x>S.idx) S.skipped.delete(x); });
  let j=S.idx+1;
  while(j<6 && !stageApplicable(j)){ S.skipped.add(j); j++; }
  if(j>=6){ return finish(); }
  S.hist.push(S.idx); S.idx=j; render();
}
function back(){ if(S.ended){S.ended=null;return render();} if(S.hist.length){S.idx=S.hist.pop();render();} }
function restart(){ S.a={};S.idx=0;S.skipped=new Set();S.ended=null;S.hist=[];S.serverResults=null;render(); }

/* 點上方流程條自由跳階段 */
function jumpTo(i){
  if(i===S.idx && !S.ended) return;
  if(!S.ended) S.hist.push(S.idx);
  S.ended=null; S.idx=i; render();
}
function stageComplete(i){
  const qs=stageQs(i); if(qs.length===0) return false;
  return qs.every(q=>{
    if(q.type==="text") return true;
    if(q.type==="multi") return (S.a[q.id]||[]).length>0;
    return !!S.a[q.id];
  });
}
function progressHTML(){
  const bar=`<div class="progress">`+STAGES.map((st,i)=>{
    let cls,label=st.n;
    if(!stageApplicable(i)){ cls="skipped"; label=st.n+"·不適用"; }
    else if(i===S.idx && !S.ended){ cls="current"; }
    else if(stageComplete(i)){ cls="done"; }
    else { cls="upcoming"; }
    return `<div class="pstep ${cls}" onclick="jumpTo(${i})"><div class="pbar"></div>${label}</div>`;
  }).join("")+`</div>`;
  return bar+`<div class="phint">↑ 可點上方階段自由切換（綠＝已填、灰斜線＝目前不適用）</div>`;
}

 else{var q=atom.split(' = ');name=q[0].trim();vals=[q[1].trim()];}
 var tv=trig[name];if(!tv||tv.known===false)return'U';for(var i=0;i<vals.length;i++)if(tv.values.indexOf(vals[i])>-1)return'T';return'F';}
function and3(a,b){return(a==='F'||b==='F')?'F':((a==='U'||b==='U')?'U':'T');}
function or3(a,b){return(a==='T'||b==='T')?'T':((a==='U'||b==='U')?'U':'F');}
function evalCond(cond,trig){var toks=cond.split(/(\bAND\b|\bOR\b|\(|\))/).map(function(t){return t.trim();}).filter(String);var pos=0;
 function expr(){var v=term();while(toks[pos]==='OR'){pos++;v=or3(v,term());}return v;}
 function term(){var v=factor();while(toks[pos]==='AND'){pos++;v=and3(v,factor());}return v;}
 function factor(){if(toks[pos]==='('){pos++;var v=expr();pos++;return v;}return evalAtom(toks[pos++],trig);}
 return expr();}
function trueAtoms(cond,trig){return cond.split(/(\bAND\b|\bOR\b|\(|\))/).map(function(t){return t.trim();})
 .filter(function(t){return t&&t!=='AND'&&t!=='OR'&&t!=='('&&t!==')';}).filter(function(at){return evalAtom(at,trig)==='T';});}
function knownT(trig,n){return trig[n]&&trig[n].known;}
function classify(lt,trig){var res=evalCond(lt.cond,trig);
 if(res==='T')return{tag:'confirmed'}; if(res==='F')return{tag:'no'};
 var priKnown=lt.pri.length>0&&lt.pri.every(function(t){return knownT(trig,t);});
 var secKnown=lt.sec.length>0&&lt.sec.some(function(t){return knownT(trig,t);});
 var missSec=lt.sec.filter(function(t){return !knownT(trig,t);});
 var missPri=lt.pri.filter(function(t){return !knownT(trig,t);});
 if(priKnown)return{tag:'needs',refine:missSec};
 if(!priKnown&&!secKnown)return{tag:'cannot',missing:lt.pri.concat(lt.sec)};
 return{tag:'cannot',missing:missPri};}
function ltCard(lt,c,zone,trig){var trigs=lt.pri.concat(lt.sec).join('、');
 var why=zone==='confirmed'?'<div class="why2">為何命中：'+(trueAtoms(lt.cond,trig).join('；')||'—')+'</div>':'';
 var note='';
 if(zone==='needs')note='<div class="note2">補充以下次要資料可更準確：'+((c.refine||[]).join('、')||'—')+'</div>';
 if(zone==='cannot')note='<div class="note2">缺少判斷依據：'+((c.missing||[]).join('、')||'—')+'</div>';
 return '<div class="lt '+zone+'"><div class="lt-h"><b>'+lt.id+'</b> '+lt.name+'</div>'+
  '<div class="lt-art">'+lt.art+'</div><div class="lt-desc">'+lt.desc+'</div>'+
  (lt.resp?'<div class="lt-resp">'+lt.resp+'</div>':'')+why+note+
  '<div class="lt-trig">依據 trigger：'+trigs+'</div></div>';}

 return '<div class="card"><div class="end" style="padding-bottom:6px"><div class="icon">📋</div>'+
   '<h2>初步合規診斷結果</h2>'+

  if(S.ended){ app.innerHTML=progressHTML()+endHTML(); window.scrollTo(0,0); return; }
